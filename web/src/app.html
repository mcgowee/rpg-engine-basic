<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<style>
			*, *::before, *::after { box-sizing: border-box; }
			body {
				margin: 0;
				font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
				font-size: 0.95rem;
				line-height: 1.45;
				background: #0f1114;
				color: #e8eaed;
			}
			a { color: #8ab4f8; }
			a:hover { text-decoration: underline; }
			h1, h2, h3, h4 { color: #e8eaed; }
			input, textarea, select {
				font-family: inherit;
				font-size: 0.9rem;
				padding: 0.5rem 0.65rem;
				border-radius: 8px;
				border: 1px solid #3c4043;
				background: #0f1114;
				color: #e8eaed;
			}
			input:focus, textarea:focus, select:focus {
				outline: none;
				border-color: #5f6368;
			}
			textarea { resize: vertical; }
			button {
				font-family: inherit;
				cursor: pointer;
			}
			code {
				background: #1a1d23;
				padding: 0.1rem 0.35rem;
				border-radius: 4px;
				font-size: 0.85em;
				color: #8ab4f8;
			}
			pre {
				background: #1a1d23;
				border: 1px solid #2a2f38;
				border-radius: 8px;
				padding: 0.75rem;
				overflow-x: auto;
				color: #e8eaed;
				font-size: 0.82rem;
			}
			table {
				border-collapse: collapse;
				width: 100%;
			}
			th {
				text-align: left;
				padding: 0.45rem 0.6rem;
				border-bottom: 2px solid #2a2f38;
				color: #9aa0a6;
				font-size: 0.82rem;
				text-transform: uppercase;
				letter-spacing: 0.03em;
			}
			td {
				padding: 0.45rem 0.6rem;
				border-bottom: 1px solid #1a1d23;
			}
			fieldset {
				border: 1px solid #2a2f38;
				border-radius: 8px;
				padding: 1rem;
			}
			legend { color: #e8eaed; font-weight: 600; }
			details summary { cursor: pointer; color: #8ab4f8; }
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
