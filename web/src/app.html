<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="A composable text RPG engine powered by LangGraph and local LLMs. Create stories, build graph pipelines, and play interactive adventures." />
		<meta name="theme-color" content="#0f1114" />
		<meta property="og:title" content="RPG Engine" />
		<meta property="og:description" content="A composable text RPG engine powered by LangGraph and local LLMs." />
		<meta property="og:type" content="website" />
		<style>
			*, *::before, *::after { box-sizing: border-box; }
			body {
				margin: 0;
				font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
				font-size: 0.95rem;
				line-height: 1.45;
				background: #0f1114;
				color: #e8eaed;
			}
			a { color: #8ab4f8; }
			a:hover { text-decoration: underline; }
			h1, h2, h3, h4 { color: #e8eaed; }
			input, textarea, select {
				font-family: inherit;
				font-size: 0.9rem;
				padding: 0.5rem 0.65rem;
				border-radius: 8px;
				border: 1px solid #3c4043;
				background: #0f1114;
				color: #e8eaed;
			}
			input:focus, textarea:focus, select:focus {
				outline: none;
				border-color: #5f6368;
			}
			textarea { resize: vertical; }
			button {
				font-family: inherit;
				cursor: pointer;
			}
			code {
				background: #1a1d23;
				padding: 0.1rem 0.35rem;
				border-radius: 4px;
				font-size: 0.85em;
				color: #8ab4f8;
			}
			pre {
				background: #1a1d23;
				border: 1px solid #2a2f38;
				border-radius: 8px;
				padding: 0.75rem;
				overflow-x: auto;
				color: #e8eaed;
				font-size: 0.82rem;
			}
			table {
				border-collapse: collapse;
				width: 100%;
			}
			th {
				text-align: left;
				padding: 0.45rem 0.6rem;
				border-bottom: 2px solid #2a2f38;
				color: #9aa0a6;
				font-size: 0.82rem;
				text-transform: uppercase;
				letter-spacing: 0.03em;
			}
			td {
				padding: 0.45rem 0.6rem;
				border-bottom: 1px solid #1a1d23;
			}
			fieldset {
				border: 1px solid #2a2f38;
				border-radius: 8px;
				padding: 1rem;
			}
			legend { color: #e8eaed; font-weight: 600; }
			details summary { cursor: pointer; color: #8ab4f8; }
			/* Focus states */
			:focus-visible {
				outline: 2px solid #8ab4f8;
				outline-offset: 2px;
			}
			button:focus-visible, a:focus-visible, input:focus-visible,
			textarea:focus-visible, select:focus-visible {
				outline: 2px solid #8ab4f8;
				outline-offset: 2px;
			}
			/* Smooth scrolling */
			html { scroll-behavior: smooth; }
			/* Skip to content */
			.skip-link {
				position: absolute;
				top: -100%;
				left: 0.5rem;
				padding: 0.5rem 1rem;
				background: #1a73e8;
				color: #fff;
				border-radius: 0 0 6px 6px;
				z-index: 1000;
				font-size: 0.85rem;
				text-decoration: none;
			}
			.skip-link:focus { top: 0; }
			/* Loading spinner */
			@keyframes spin { to { transform: rotate(360deg); } }
			.spinner {
				display: inline-block;
				width: 1rem; height: 1rem;
				border: 2px solid #2a2f38;
				border-top-color: #8ab4f8;
				border-radius: 50%;
				animation: spin 0.6s linear infinite;
				vertical-align: middle;
				margin-right: 0.35rem;
			}
			/* Page transition fade */
			@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
			main, section, .docs, .lobby, .editor-page, .hub, .page {
				animation: fadeIn 0.15s ease-out;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
